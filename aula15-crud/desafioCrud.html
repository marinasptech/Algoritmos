<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafio CRUD</title>
</head>

<body>

<h3> Cadastrar estoque de comidas</h3>
<input type="text" id="idComida"><br>
<button onclick="cadastrar()"> Cadastrar</button><br>

<h3>Verificar estoque</h3>
<button onclick="verificar()"> Verificar</button><br>

<h3>digite o nome de uma comida</h3>
<input type="text" id="idBusca" placeholder="um por vez"><br>
<button onclick="pesquisar()">pesquisar</button><br>

<h3> Exibir estoque</h3>
<button onclick="exibir()">Exibir Estoque</button><br><br>


<h3>Alterar Nome de Comida</h3>

<input type="text" id="nomeAtual" placeholder="Nome atual"><br>
<input type="text" id="nomeNovo" placeholder="Novo nome"><br>
<button onclick="alterar()">Alterar Nome</button>

<br><br>

<h3>Remover Comida</h3>

<input type="text" id="removerComida" placeholder="Nome da comida"><br>
<button onclick="remover()">Remover Comida</button>

<br><br>

<div id="resultado"></div>

</body>

<script>

let estoque = [];

function cadastrar() {
let comida = idComida.value;
estoque.push(comida);
}

function verificar() {
let tamanhoE = estoque.length

if (tamanhoE < 3) {
resultado.innerHTML = "Desse jeito, o Luffy devora até o navio<br>"

} else if (tamanhoE >= 3 && tamanhoE <= 7) {
resultado.innerHTML = "O comilão do Luffy não vai deixar sobrar nenhuma comida<br>"

} else if (tamanhoE >= 8 && tamanhoE <= 10) {
resultado.innerHTML = "Assim, talvez sobre um pouco para a tripulação<br>"

} else {
resultado.innerHTML = "Desse jeito vai ter comida para todo mundo e ainda consigo guardar um pouco para a senhorita Nami!<br>"
}
}

function pesquisar() {

let busca = idBusca.value;
let unidade = 0;
let tamanhoE = estoque.length

for (let i = 0; i <= tamanhoE; i++) {
if (estoque[i] == busca) {
unidade++
}
}

if (unidade > 0) {
resultado.innerHTML = `Temos a comida ${busca} e há ${unidade} unidade(s) dela<br>`

} else {
resultado.innerHTML = `Alguém vai ter que comprar ${busca}, tá fazendo falta...<br>`
}
}


function exibir() {

let tamanhoE = estoque.length
let cont = 0;
listaExc = [];

while (cont < tamanhoE) {

let contComida = 0;
let comAtual = estoque[cont]

if (!listaExc.includes(comAtual)) {

for (let i = 0; i <= tamanhoE; i++) {

if (comAtual == estoque[i]) {
contComida++
}
}

listaExc.push(comAtual)

if (contComida == 1) {
resultado.innerHTML += `${comAtual} (${contComida} unidade)<br>`

} else {
resultado.innerHTML += `${comAtual} (${contComida} unidades)<br>`
}

}

cont++
}

}



function alterar(){

let atual = nomeAtual.value;
let novo = nomeNovo.value;

let tamanhoE = estoque.length;
let encontrado = 0;

for(let i = 0; i < tamanhoE; i++){

if(estoque[i] == atual){
estoque[i] = novo;
encontrado++
}

}

if(encontrado > 0){
resultado.innerHTML = `A comida '${atual}' foi alterada para '${novo}'<br>`
}else{
resultado.innerHTML = `A comida '${atual}' não foi encontrada no estoque.<br>`
}

}



function remover(){

let comidaRemover = removerComida.value;

let tamanhoE = estoque.length;
let encontrado = 0;

let novoEstoque = [];

for(let i = 0; i < tamanhoE; i++){

if(estoque[i] == comidaRemover){
encontrado++
}else{
novoEstoque.push(estoque[i])
}

}

estoque = novoEstoque;

if(encontrado > 0){
resultado.innerHTML = `A comida '${comidaRemover}' foi removida do estoque.<br>`
}else{
resultado.innerHTML = `A comida '${comidaRemover}' não está no estoque.<br>`
}

}

</script>

</html>
