<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h2>Buscar Filmes:</h2>
  
  <span>Nome:</span>
  <input type="text" id="ipt_nome">
  <button onclick="pesquisarNome()">Pesquisar</button>

  <span>Diretor:</span>
  <input type="text" id="ipt_diretor">
  <button onclick="pesquisarDiretor()">Pesquisar</button>

  <span>Ano:</span>
  <select id="ipt_ano_parametro">
    <option value="maior_igual">&gt;=</option>
    <option value="igual">==</option>
    <option value="menor_igual">&lt;=</option>
  </select>
  <input type="number" id="ipt_ano">
  <button onclick="pesquisarAno()">Pesquisar</button><br><br>

  <span>Gênero:</span>
  <input type="text" id="ipt_genero">
  <button onclick="pesquisarGenero()">Pesquisar</button>

  <span>Média:</span>
  <select id="ipt_media_parametro">
    <option value="maior_igual">&gt;=</option>
    <option value="igual">==</option>
    <option value="menor_igual">&lt;=</option>
  </select>
  <input type="text" id="ipt_media">
  <button onclick="pesquisarMedia()">Pesquisar</button><br><br>

  <button onclick="pesquisar()">Mostrar Todos</button>

  <div id="div_resultado"></div>
</body>
</html>
<script src="dados.js"></script>

<script>
  function calcularMedia(notas) {
    let soma = 0;
    for (let i = 0; i < notas.length; i++) {
      soma += notas[i];
    }
    return soma / notas.length;
  }

  function exibirResultados(listaFilmes) {
    const div = document.getElementById('div_resultado');
    div.innerHTML = ""; // Limpa resultados anteriores

    for (let i = 0; i < listaFilmes.length; i++) {
      const filme = listaFilmes[i];
      const media = calcularMedia(filme.notas).toFixed(2);
      div.innerHTML += `Nome: ${filme.nome} | Diretor: ${filme.diretor} | Ano: ${filme.ano} | Média: ${media}<br>`;
    }
  }

  function pesquisarNome() {
    const busca = ipt_nome.value.toLowerCase(); 
    const filtradosn = [];
    for (let i = 0; i < filmes.length; i++) {
      if (filmes[i].nome.toLowerCase().includes(busca)) {
        filtradosn.push(filmes[i]);
      }
    }
    exibirResultados(filtradosn);
  }

  function pesquisarDiretor() {
    const busca = ipt_diretor.value.toLowerCase();
    const filtrados = [];
    for (let i = 0; i < filmes.length; i++) {
      if (filmes[i].diretor.toLowerCase().includes(busca)) {
        filtrados.push(filmes[i]);
      }
    }
    exibirResultados(filtrados);
  }

  function pesquisarAno() {
    const anoBusca = Number(ipt_ano.value);
    const parametro = ipt_ano_parametro.value;
    const filtrados = [];

    for (let i = 0; i < filmes.length; i++) {
      const anoFilme = filmes[i].ano;
      if (parametro == "maior_igual" && anoFilme >= anoBusca) {
        filtrados.push(filmes[i]);
      } else if (parametro == "igual" && anoFilme == anoBusca) {
        filtrados.push(filmes[i]);
      } else if (parametro == "menor_igual" && anoFilme <= anoBusca) {
        filtrados.push(filmes[i]);
      }
    }
    exibirResultados(filtrados);
  }

  function pesquisarGenero() {
    const busca = ipt_genero.value.toLowerCase();
    const filtrados = [];
    for (let i = 0; i < filmes.length; i++) {
      let possuiGenero = false;
      for (let j = 0; j < filmes[i].generos.length; j++) {
        if (filmes[i].generos[j].toLowerCase().includes(busca)) {
          possuiGenero = true;
        }
      }
      if (possuiGenero) filtrados.push(filmes[i]);
    }
    exibirResultados(filtrados);
  }

  function pesquisarMedia() {
    const mediaBusca = Number(ipt_media.value);
    const parametro = ipt_media_parametro.value;
    const filtrados = [];

    for (let i = 0; i < filmes.length; i++) {
      const mediaFilme = calcularMedia(filmes[i].notas);
      if (parametro == "maior_igual" && mediaFilme >= mediaBusca) {
        filtrados.push(filmes[i]);
      } else if (parametro == "igual" && mediaFilme.toFixed(2) == mediaBusca.toFixed(2)) {
        filtrados.push(filmes[i]);
      } else if (parametro == "menor_igual" && mediaFilme <= mediaBusca) {
        filtrados.push(filmes[i]);
      }
    }
    exibirResultados(filtrados);
  }

  function pesquisar() {
    exibirResultados(filmes);
  }
  </script>
