    digite o valor da pizza: <input type="text" id="id_valor">
    digite a quantidade de amigos: <input type="text" id="id_qtdPessoa">
    <button onclick="calcular()">#lovepizza</button>

<script>

        let qtd = Number(id_qtdPessoa.value);
