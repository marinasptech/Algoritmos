<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    valor aqui: <br><input type="number" id="id_valor">
    <button onclick="depositar()">Depositar</button>
    <button onclick="retirar()">Retirar</button>
    <div id="mensagem"></div>
</body>
<script>
    let saldo = 0;
    function depositar(){
        let valor = Number(id_valor.value);
        saldo += valor;
        alert(`Deposito de R$ ${valor} efetuado! Saldo atual R$ ${saldo}`)
    }
    function retirar(){
        let valor = Number(id_valor.value);
        saldo -= valor;
        alert(`"Retirada de R$ ${valor} efetuada! Saldo atual: R$ ${saldo}`)
    }
</script>
</html>
