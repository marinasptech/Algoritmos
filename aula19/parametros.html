<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="add(5)">adicionar 5</button><br>
    <button onclick="add(20)">adicionar 20</button><br>
    <button onclick="add(7)">adicionar 7</button><br>
    <button onclick="add(67)">adicionar 67</button><br>
    <button onclick="add(6767)">adicionar 6767</button><br>

    <div id="resultado"></div>
</body>
<script>
    let num = 0;

    function add(numAdd){
        num += numAdd;
        resultado.innerHTML = `O valor é ${num}`;
    }
</script>
</html>
