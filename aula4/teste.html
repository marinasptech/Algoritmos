<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" id="id_nome">
    <button onclick="apresentar()">apresentar</button>
    <p id="id_res"></p>
</body>
<script>
    function apresentar() {
        let nome = id_nome.value;
        id_res.innerHTML = `ola ${nome} bom te ver aqui`
    }
</script>

</html>
