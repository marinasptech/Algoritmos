<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores </title>
</head>
<body>
    <h1> Operadores Matemáticos</h1>
    digite primeiro num: <input type="text" id="id_num_01">
    digite segundo num: <input type="text" id="id_num_02">

    <button onclick="calcular()">Calcular</button>
</body>
<script>
    function calcular(){
        let n1 = Number(id_num_01.value);
        let n2 = Number(id_num_01.value);
        alert("a subtração é: " + (n1 - n2))
        alert("a soma é: " + (n1 + n2))
        alert("a multiplicacao é: " + (n1 * n2))
        alert("a divisao é: " + (n1 / n2))
    }
</script>
</html>
