<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_idade">
    <input type="text" id="ipt_qtd_pets">
    <button onclick="analisar()">Analisar</button>
    <div id="div_resultado"></div>
</body>
<script>
    function analisar(){
        let idade = Number(ipt_idade.value);
        let qtdPets = Number (ipt_qtd_pets.value);

        if( idade >= 18 && qtdPets >= 3){
            div_resultado.innerHTML = "você tem direito ao crédito Pet Feliz"
        }
    }
</script>
</html>
