<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticação Segura: Acesso ao Banco Melete</title>
</head>
<body>
    <p>digite o login</p>
    <input type="text" id="idLogin"><br>
    <p>digite a senha</p>
    <input type="password" id="idSenha"><br>
    <p> digite o nome do animal de estimação</p>
    <input type="text" id="idAnimal">

    <button onclick="autenticar()">autenticar</button>
    <div id="resultado"></div>
</body>
<script>
    function autenticar(){
        login =idLogin.value;
        senha = idSenha.value;
        animal = idAnimal.value;
        let tentativas = 3;

        if(login == 'ana' && senha == 'braga' && animal == 'louro jose'){
            resultado.innerHTML = "Usuário autenticado";
            tentativas = 3;
        } else{
            if (tentativas = 0){
                resultado.innerHTML= "Tentativas excedidas não sera mais possivel fazer login"
            }else {
            resultado.innerHTML = `Falha na autenticação <br> você possui mais ${tentativas} tentativas <br> <button onclick="autenticar()">autenticar novamente</button>`;
            tentativas = -1;
            
            }
        } 
    }
</script>
</html>
<!-- 
Melhore o exercício 4, de tal forma que: 

a) Sempre que ocorrer uma falha na autenticação, deve aparecer abaixo da frase de 
"Falha de autenticação" uma outra frase, como esta: 

            Você ainda tem 2 tentativa(s) 

b) A ideia é que o usuário tem 3 tentativas de autenticação. Sempre que errar novamente 
na autenticação, o "contador" de tentativas reduz em 1 na tela. 

c) Uma vez que se esgotarem as tentativas, deve surgir mais uma frase abaixo, que seria 

     Usuário BLOQUEADO! Procure seu gerente! 

d) Em caso de usuário bloqueado, não adianta nem tentar fazer uma autenticação com as 
credenciais corretas, que nada mais acontecerá 

e) Caso o usuário autentique com sucesso, sem que tenham sido queimadas as 3 tentativas,
 a mensagem de autenticação aparece normalmente e a frase com a quantidade de tentativas 
 deve sumir da tela e deve ser "reiniciada" para as próximas falhas. 
-->
