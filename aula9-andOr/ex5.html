<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação do Clima: Está Agradável ou Desconfortável?</title>
</head>
<body>
    <p> digite a temperatura</p>
    <input type="number" id="idTemp"><br>
    <p>digite a umidade do ar</p>
    <input type="number" id="idUmid"><br>
    <button onclick="avaliar()">avaliar clima</button>
    <div id="resultado"></div>
</body>
<script>
    function avaliar(){
        umid = idUmid.value;
        temp = idTemp.value;

        if(umid <0 || umid > 100){
            alert("Valor de umidade inválido")
            resultado.innerHTML = "";           
        } else if(temp >= 22 && temp <= 23 && umid < 60){
            resultado.innerHTML = "Clima agradável";
        } else {
             resultado.innerHTML = "Clima desconfortável";
        }
    }
</script>
</html>

a) Solicite a temperatura 

b) Solicite a umidade do ar 

c) Ao clicar em 'Avaliar clima': 

      c.1) Caso a umidade for inválida, ou seja, menor que 0 e maior que 100, exiba um alert 
      "Valor de umidade inválido" e limpe qualquer outro texto que exista na tela (item c.2) 
      c.2) Caso a umidade for válida, exiba uma dessas frases na própria página, abaixo do botão: 

            "Clima agradável", caso a temperatura for entre 22 e 23 e a umidade for menor que 60. 
            "Clima desconfortável", em caso contrário. -->
