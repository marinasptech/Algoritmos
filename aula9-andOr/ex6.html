<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desempenho Escolar: O Aluno Foi Aprovado?</title>
</head>
<body>
    <p> digite sua nota</p>
    <input type="text" id="idNota">
    <p>digite a sua frequência</p>
    <input type="text" id="idFreq">

    <button onclick="analisar()">Analisar aluno</button>
    <div id="resultado"></div>
</body>
<script>
    function analisar(){
        nota = Number(idNota.value);
        freq = Number(idFreq.value);

        if( nota <0 || nota > 10){
            alert("Onde já se viu nota <0 ou >10?!")
            resultado.innerHTML = "";
        } else if (freq < 0 || freq >100){
                alert("Onde já se viu frequência <0 ou >100?!")
                resultado.innerHTML = "";
        } else if (nota >= 0 && nota < 6){
            resultado.innerHTML = "Aluno ficou abaixo da média<br>";
        } else if(nota >= 6 && nota <= 8){
            resultado.innerHTML = "Aluno ficou na média<br>";
        } else{
            resultado.innerHTML = "Aluno acima da média<br>";
        }
        if (freq >= 75){
            resultado.innerHTML += "Aluno aprovado por frequência";
        } else {
            resultado.innerHTML += `<br>Aluno reprovado por frequência`;
        }
    }
   
</script>
</html>
<!-- 
Crie um programa que avalie o desempenho de um aluno, o qual: 

a) Solicite a nota e a frequência do aluno 

b) Ao clicar em "Analisar aluno", faça as seguintes ações... 

c) Caso a nota não seja válida, ou seja, caso não esteja entre 0 e 10, exiba um alert 
"Onde já se viu nota <0 ou >10?!" e limpe qualquer outro resultado que já estiver aparecendo 
    na tela 

d) Caso a frequência não seja válida, ou seja, caso não esteja entre 0 e 100, exiba um alert 
"Onde já se viu frequência <0 ou >100?!" e limpe qualquer outro resultado
 que já estiver aparecendo na tela 

e) Caso a nota estiver entre 0 e menor que 6, exiba na tela essa frase:
 "Aluno ficou abaixo da média" 

f) Caso a nota estiver entre 6 e 8, exiba na tela essa frase: "Aluno ficou na média" 

g) Caso a nota estiver entre mais que 8 e 10, exiba na tela essa frase: "Aluno acima da média" 

h) Caso o aluno tiver frequência a partir de 75, exiba na tela "Aluno aprovado por frequência" 
ou "Aluno reprovado por frequência", em caso contrário 

 -->
