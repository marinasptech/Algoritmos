<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Preço do Bilhete Único de São Paulo</title>
</head>
<body>
    <p> digite o tipo de passageiro</p>
    <input type="text" id="idPassageiro" list="lPassageiro" placeholder="Digite ou selecione...">
    <datalist id="lPassageiro">
        <option value="Comum">
        <option value="Estudante">
        <option value="Idoso/PNE">
    </datalist>

    <p> digite o tipo de passagem</p>
    <input type="text" id="idPassagem" list="lPassagem" placeholder="Digite ou selecione...">
    <datalist id="lPassagem">
        <option value="Unica">
        <option value="Integracao">
    </datalist>
    <button onclick="simular()">Simular preço</button>
    <div id="resultado"></div>

</body>
<script>
    function simular(){
        passagem = idPassagem.value;
        passageiro = idPassageiro.value;

        if(passageiro == 'Estudante' && passagem == 'Unica'){
            valor = (4.40/2);
            resultado.innerHTML = `Valor da passagem escolhida: R$ ${valor} `
        } else if(passageiro == 'Estudante' && passagem == 'Integracao'){
            valor = (5.90/2);
            resultado.innerHTML = `Valor da passagem escolhida: R$ ${valor} `
        } else if (passageiro == 'Comum' && passagem == 'Unica'){
            valor = 4.40;
            resultado.innerHTML = `Valor da passagem escolhida: R$ ${valor} `
        }else if(passageiro == 'Comum' && passagem == 'Integracao'){
            valor = 5.90;
            resultado.innerHTML = `Valor da passagem escolhida: R$ ${valor} `
        } else if (passageiro == 'Idoso/PNE'){
             valor = 0;
            resultado.innerHTML = `Valor da passagem escolhida: R$ ${valor} `
        } else {
            resultado.innerHTML = `Opção invalida `
        }
    }
</script>
</html>
<!-- Crie um pequeno simulador de preço de passagem de Bilhete Único de São Paulo num programa, 
 o qual: 

a) Tenha uma combo para indicar o tipo de passageiro, com os itens 

            Comum 
            Estudante 
            Idoso/PNE 

b) Tenha uma outra combo, para indicar o tipo de passagem, com os itens 

            Passagem única 
            Passagem integração 

c) Ao clicar num botão "Simular preço", considere que o preço unitário de uma passagem única 
é R$4,40 e que a integração é R$5,90 para fazer os cálculos necessários para exibir uma frase 
como esta: 

            Valor da passagem escolhida: R$X,XX 

d) Considere ainda que um estudante tem 50% de desconto e idoso/PNE possuem gratuidade em 
qualquer tipo de passagem 
-->
