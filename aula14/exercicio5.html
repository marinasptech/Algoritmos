<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Números Misteriosos</title>
</head>

<body>

<button onclick="misteriosos()">Números Cabalísticos</button>

<div id="resultado"></div>

<script>
    function misteriosos(){

var i = 1
resultado.innerHTML = ""

while(i <= 30){

if(i != 3 && i != 4 && i != 7 && i != 10 && i != 12){

resultado.innerHTML += i + "<br>"

}

i++

}

}
</script>

</body>
</html>
