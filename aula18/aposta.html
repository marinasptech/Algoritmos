<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h4>Bem-vindo ao jogo de apostas!!</h4>
    <h5> quanto você quer apostar?</h5><input type="number" id="idaposta">
    <h5>Escolha um número entre 1 e 10: </h5> <input type="number" id="idnum">
    <button onclick="apostar()">apostar</button>
    <div id="resul"></div>
</body>
<script>
    function apostar() {
        let saldo = 100;
        let aposta = idaposta.value;
        let num = idnum.value;
        let min = 1;
        let max = 10;
        let aleatorio = Math.random();
        let resultado = parseInt(aleatorio * (max - min + 1) + min);

        resul.innerHTML += `<br>Seu saldo atual é: ${saldo}`
        if (aposta > saldo) {
            resul.innerHTML += `<br>Você não pode apostar mais do que o saldo!`
        }
        else {

            resul.innerHTML += `<br>O número sorteado foi: ${resultado}`

            if (num == resultado) {
                ganho = aposta * 10
                saldo += ganho
                resul.innerHTML += `<br>Parabéns! Você ganhou ${ganho}!`
            }
            else {
                saldo -= aposta
                resul.innerHTML += `<br>seu saldo é: ${saldo}`
                resul.innerHTML += `<br>Você perdeu a aposta.`
            }
        }
    }
</script>

</html>
