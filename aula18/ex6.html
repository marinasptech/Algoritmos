<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="sortear()">Sortear momento do dia</button>

    <div id="resultado"></div>
</body>
<script>

    function sortear() {

        let hora = Math.floor(Math.random() * 24);

        if (hora <= 11) {
            resultado.innerHTML = "Bom dia, flor do dia, são " + hora + "h!";
        }

        else if (hora <= 17) {
            resultado.innerHTML = "Boa tarde, já vai tarde! São " + hora + "h!";
        }

        else {
            resultado.innerHTML = "Boa noite, durma bem! São " + hora + "h!";
        }

    }

</script>

</html>
