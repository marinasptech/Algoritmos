<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>

<button onclick="sortear()">Sortear</button>

<div id="resultado"></div>
<div id="frase"></div>
</body>

<script>

function sortear(){

let numero = Math.random();

resultado.innerHTML = numero;

if(numero > 0.5){
frase.innerHTML = "Eu arredondaria para 1";
}else{
frase.innerHTML = "Eu arredondaria para 0";
}

}

</script>
</html>
