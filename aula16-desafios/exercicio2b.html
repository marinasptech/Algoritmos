<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>

<body>

<input id="ipt_texto">
<button onclick="inverter()">Inverter</button>

<br><br>

<div id="div_msg"></div>

</body>

<script>

function inverter(){

    let texto = ipt_texto.value;
    let invertido = "";

    for(let i = texto.length; i >= 0; i--){
        invertido += texto[i];
    }

    div_msg.innerHTML = invertido;
}

</script>

</html>
