





<script>

function projetar() {

let deposito = Number(ipt_deposito.value);
let meses = Number(ipt_meses.value);
let juros = Number(ipt_juros.value)/100;
let sonho = ipt_sonho.value;
let valorSonho = Number(ipt_valorSonho.value);

div_msg.innerHTML = "";

if(deposito <= 0){
    div_msg.innerHTML = "Depósito inválido";
    return;
}

if(meses <= 0 || meses % 1 != 0){
    div_msg.innerHTML = "Meses inválidos";
    return;
}

if(juros <= 0 || juros >= 0.10){
    div_msg.innerHTML = "Juros inválido";
    return;
}

if(sonho.length < 3){
    div_msg.innerHTML = "Sonho inválido";
    return;
}

if(valorSonho <= deposito){
    div_msg.innerHTML = "Valor do sonho inválido";
    return;
}

let valorInicial = 0;
let valorFinal = 0;

for(let i=1;i<=meses;i++){

    valorInicial = valorFinal;

    let valorJuros = valorInicial * juros;

    valorFinal = valorInicial + valorJuros + deposito;

    div_msg.innerHTML += 
    `Mês ${i} - Valor Inicial R$ ${valorInicial.toFixed(2)} 
    - Juros R$ ${valorJuros.toFixed(2)} 
    - Depósito R$ ${deposito.toFixed(2)} 
    - Valor Final R$ ${valorFinal.toFixed(2)} <br>`;
}

let diferenca = valorFinal - valorSonho;

if(valorFinal >= valorSonho){

div_msg.innerHTML += `<br>Parabéns você é um POUPADOR, além do seu sonho de ${sonho} ainda sobrou R$ ${diferenca.toFixed(2)}`;

}else{

div_msg.innerHTML += `<br>Você precisa poupar um pouco mais. Para o sonho de ${sonho} ainda falta R$ ${(diferenca*-1).toFixed(2)}`;

}

}

</script>
