<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>

<body>

<input id="ipt_palavra">
<button onclick="validar()">Validar Palíndromo</button>

<br><br>

<div id="div_msg"></div>

</body>

<script>

function validar(){

    let texto = ipt_palavra.value.toLowerCase().replaceAll(" ","");
    let invertido = texto.split("").reverse().join("");

    if(texto == invertido){
        div_msg.innerHTML = "É palíndromo <br>";
    }else{
        div_msg.innerHTML = "Não é palíndromo <br>";
    }

    div_msg.innerHTML += "Invertido: " + invertido;

}

</script>

</html>
