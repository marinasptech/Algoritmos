<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>CRUD do Sanji</title>
</head>

<body>
    <h3>Cadastrar Comida</h3>
    <input id="ipt_comida">
    <button onclick="cadastrar()">Cadastrar</button>

    <br><br>
    <button onclick="exibir()">Exibir Estoque</button>

    <br><br>
    <div id="div_msg"></div>

</body>

</html>

<script>
    let lista = [];

    function cadastrar() {
        let comida = ipt_comida.value;

        lista.push(comida);

        div_msg.innerHTML = `Comida ${comida} cadastrada!`;
    }

    function exibir() {
        let texto = "";

        for (let i = 0; i < lista.length; i++) {
            let qtd_comida = 0;

            for (let j = 0; j < lista.length; j++) {
                if (lista[j] == lista[i]) {
                    qtd_comida++;
                }
            }
            texto += `${lista[i]} (${qtd_comida}) unidade(s) <br>`;

        }

        div_msg.innerHTML = texto;
    }
</script>
