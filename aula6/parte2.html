<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h1>Calculadora SPFlix</h1>

  <div>
    <p>Qualidade (720p ou 1080p ou 4K):</p>
    <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>

</html>
<script>
  function exibirResultado() {
    let qtdTelas = Number(ipt_qtd_telas.value);
    let qtdTelasExtras = Number(ipt_qtd_telas_extras.value);
    let qtdTotal = qtdTelas + qtdTelasExtras;

    if (qtdTotal <= 2) {
      if (qtdTelasExtras > 0) {
        qtdTelaEx = qtdTelasExtras * 12.90;
        valor = (10 + qtdTelaEx);
        div_mensagem.innerHTML = `O valor das telas do seu plano é R$${valor.toFixed(2)}`;
      }
    } else if (qtdTotal <= 4) {
       if (qtdTelasExtras > 0) {
        qtdTelaEx = qtdTelasExtras * 12.90;
        valor = (20 + qtdTelaEx);
        div_mensagem.innerHTML = `O valor das telas do seu plano é R$${valor.toFixed(2)}`;
      }
    } else if (qtdTotal > 4 ) {
        qtdTelaEx = qtdTelasExtras * 12.90;
        valor = (30 + qtdTelaEx);
        div_mensagem.innerHTML = `O valor das telas do seu plano é R$${valor.toFixed(2)}`;
    } else {
      div_mensagem.innerHTML = "digite valor correto";
    }

  }

</script>
