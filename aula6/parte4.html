<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h1>Calculadora SPFlix</h1>

  <div>
    <p>Qualidade (720p ou 1080p ou 4K):</p>
    <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>

</html>
<script>
  function exibirResultado() {
    let qualidade = ipt_qualidade.value;
    let qtdTelas = Number(ipt_qtd_telas.value);
    let qtdTelasExtras = Number(ipt_qtd_telas_extras.value);
    let qtdTotal = qtdTelas + qtdTelasExtras;
    let qtdTelaEx = qtdTelasExtras * 12.90;
    let download = ipt_download.value;


    if (qualidade == '720p') {
     valor = 15;
      div_mensagem.innerHTML = `O valor base do seu plano é R$${valor.toFixed(2)}`;
    } else if (qualidade == '1080p') {
      valor = 20;
      div_mensagem.innerHTML = `O valor base do seu plano é R$${valor.toFixed(2)}`;
    } else if (qualidade == '4k') {
      valor = 25;
      div_mensagem.innerHTML = `O valor base do seu plano é R$${valor.toFixed(2)}`;
    } else {
      div_mensagem.innerHTML = "digite valor correto";
    }
    if (qtdTotal <= 2) {
      if (qtdTelasExtras > 0) {
        valorTela = (10 + qtdTelaEx);
        div_mensagem.innerHTML += `<br> O valor das telas do seu plano é R$${valorTela.toFixed(2)}`;
      }
    } else if (qtdTotal <= 4) {
      if (qtdTelasExtras > 0) {
        valorTela = (20 + qtdTelaEx);
        div_mensagem.innerHTML += `<br> O valor das telas do seu plano é R$${valorTela.toFixed(2)}`;
      }
    } else if (qtdTotal > 4) {
      valorTela = (30 + qtdTelaEx);
      div_mensagem.innerHTML += `<br> O valor das telas do seu plano é R$${valorTela.toFixed(2)}`;
      div_mensagem.innerHTML += `<br> O valor total é R$${valorTela.toFixed(2)}`;

    } else {
      div_mensagem.innerHTML += "digite valor correto";
    }
    if(download = 'sim'){
      valorFinal = (valorTela + (valorTela*0.1) + 0.5 + valor);
      taxa = (valorTela*0.1) + 0.5;
      div_mensagem.innerHTML+= `Você optou por fazer download e por isso sua conta irá subir em ${taxa}% `
    } else{
          valorFinal = (valorTela + valor) - 0.10;
    }
  div_mensagem.innerHTML += `Valor final: R$${valorFinal}`;

    if(qtdTotal >0){
      pagar = valorFinal/qtdTotal;
      div_mensagem.innerHTML += `Se quiser dividir fica R$${pagar.toFixed(2)} para cada!`
    }
  }
</script>
