<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    img {
  width: 16px;
  height: 16px; 
}
</style>
<body>
    <h5>Quantos depositos você fez no banco?</h5>
    <input type="number" id="idDeposito">
    <h5>Quanto você depositou?</h5>
    <input type="number" id="idValor">
    <button onclick="contar()">Acompanhar grana</button>
    <div id="resul"></div>
</body>
<script>
    function contar() {
        resul.innerHTML = "";
        let qtd = Number(idDeposito.value);
        let valor = Number(idValor.value);
        let total = 0;
        let contagem = 0;

        for (let i = 0; i < qtd; i++) {
            contagem ++;
            total = total + valor;
            if(contagem == 3){
                contagem = 0;
                total = total +(total * 0.01);
                resul.innerHTML += `<img src="estrela.jpg">${i + 1} Mês: R$ ${total} <br>`;
            }
            else{
                resul.innerHTML += `${i + 1} Mês: R$ ${total} <br>`;
            }
        } 
        resul.innerHTML += `Total guardado: R$ ${total}   `
    }
</script>
</html>
