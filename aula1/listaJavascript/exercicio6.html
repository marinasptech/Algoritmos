<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4>Farol</h4>

<button onclick="pare()">Pare</button>
<button onclick="pense()">Pense</button>
<button onclick="siga()">Siga</button>

<p id="mensagem"></p>

<script>
function pare() {
    mensagem.innerHTML = "Pare e aguarde!";
}

function pense() {
    mensagem.innerHTML ="Pense se pode seguir ou se deve parar!";
}

function siga() {
    mensagem.innerHTML ="Pode seguir adiante";
}
</script>
</body>
</html>
