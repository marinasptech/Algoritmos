<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Nota Escolar</h2>

Nota: <input type="number" id="nota"><br><br>

<button onclick="avo()">Opinião da avó</button>
<button onclick="mae()">Opinião da mãe</button>

<div id="resultado"></div>

<script>
function avo() {
    resultado.innerHTML = "Muito bem, que neto inteligente, porque tirou " + nota.value;
}

function mae() {
    resultado.innerHTML = "Não fez mais que tua obrigação com essa nota " + nota.value;
}
</script>

</body>
</html>
